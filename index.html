<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sedona Olympics 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f13; color: #f0f0f5; font-family: 'Inter', system-ui, sans-serif; }
  button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const TEAMS = [
  { id: 0, name: "Aaron & Josh", country: "United States", flag: "🇺🇸" },
  { id: 1, name: "MJ & Nick", country: "Djibouti", flag: "🇩🇯" },
  { id: 2, name: "Ashlyn & Sandra", country: "Philippines", flag: "🇵🇭" },
  { id: 3, name: "Cortney & Anthony", country: "Malta", flag: "🇲🇹" },
];

const SPORTS = [
  { id: "bp", name: "Beer Pong", icon: "🏓", color: "#f59e0b" },
  { id: "pool", name: "Pool", icon: "🎱", color: "#8b5cf6" },
];

const STORAGE_KEY = "sedona-rr-v1";

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initMatches() {
  // All 6 pairs
  const pairs = [];
  for (let i = 0; i < TEAMS.length; i++)
    for (let j = i + 1; j < TEAMS.length; j++)
      pairs.push([TEAMS[i].id, TEAMS[j].id]);

  // Randomly assign sports — try to balance 3 per sport
  const sportIds = shuffle(["bp","bp","bp","pool","pool","pool"]);

  return pairs.map(([a, b], i) => ({
    id: i,
    a,
    b,
    sport: sportIds[i],
    winner: null,
  }));
}

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    return saved ? JSON.parse(saved) : null;
  } catch { return null; }
}

function getMedals(matches) {
  // wins per team
  const wins = { 0: 0, 1: 0, 2: 0, 3: 0 };
  matches.forEach(m => { if (m.winner !== null) wins[m.winner]++; });

  const sorted = TEAMS.map(t => ({ ...t, wins: wins[t.id] }))
    .sort((a, b) => b.wins - a.wins);

  // Assign gold/silver/bronze/nothing
  // Ties share placement
  const result = {};
  sorted.forEach((t, i) => {
    const medal = i === 0 ? "gold" : i === 1 ? "silver" : i === 2 ? "bronze" : "none";
    // handle ties — same wins as previous = same medal
    if (i > 0 && t.wins === sorted[i-1].wins) {
      result[t.id] = result[sorted[i-1].id];
    } else {
      result[t.id] = medal;
    }
  });

  return { wins, medals: result, sorted };
}

const MEDAL_ICON = { gold: "🥇", silver: "🥈", bronze: "🥉", none: "" };
const MEDAL_COLOR = { gold: "#f59e0b", silver: "#94a3b8", bronze: "#cd7f32", none: "#3a3a4a" };

function App() {
  const [matches, setMatches] = useState(() => loadState() || initMatches());
  const [saveFlash, setSaveFlash] = useState(false);
  const [activeTab, setActiveTab] = useState("matches");

  useEffect(() => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(matches));
    setSaveFlash(true);
    const t = setTimeout(() => setSaveFlash(false), 1200);
    return () => clearTimeout(t);
  }, [matches]);

  function setWinner(matchId, winnerId) {
    setMatches(prev => prev.map(m => {
      if (m.id !== matchId) return m;
      return { ...m, winner: m.winner === winnerId ? null : winnerId };
    }));
  }

  function resetAll() {
    if (confirm("Reset the entire tournament?")) setMatches(initMatches());
  }

  const completed = matches.filter(m => m.winner !== null).length;
  const allDone = completed === matches.length;
  const { wins, medals, sorted } = getMedals(matches);

  // Group matches by sport for display
  const bpMatches = matches.filter(m => m.sport === "bp");
  const poolMatches = matches.filter(m => m.sport === "pool");

  function MatchCard({ match }) {
    const teamA = TEAMS[match.a];
    const teamB = TEAMS[match.b];
    const sport = SPORTS.find(s => s.id === match.sport);
    const color = sport.color;
    const hasWinner = match.winner !== null;

    return (
      <div style={{ background: "#1a1a24", borderRadius: 14, overflow: "hidden", border: hasWinner ? "1px solid " + color + "50" : "1px solid #1e1e28" }}>
        <div style={{ padding: "8px 14px", background: "#14141e", borderBottom: "1px solid #12121a", display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 13 }}>{sport.icon}</span>
          <span style={{ fontSize: 11, fontWeight: 700, color: color, letterSpacing: "0.08em", textTransform: "uppercase" }}>{sport.name}</span>
        </div>
        <div style={{ display: "flex", alignItems: "stretch" }}>
          {[teamA, teamB].map((team, ti) => {
            const isWinner = match.winner === team.id;
            const isLoser = hasWinner && !isWinner;
            return (
              <React.Fragment key={team.id}>
                {ti === 1 && <div style={{ display: "flex", alignItems: "center", padding: "0 6px", color: "#2a2a3a", fontWeight: 800, fontSize: 10 }}>VS</div>}
                <button
                  onClick={() => setWinner(match.id, team.id)}
                  style={{ flex: 1, padding: "16px 10px", background: isWinner ? color + "25" : "transparent", border: "none", cursor: "pointer", textAlign: "center", color: isWinner ? color : isLoser ? "#2e2e3e" : "#f0f0f5", transition: "all 0.2s" }}
                >
                  <div style={{ fontSize: 28, filter: isLoser ? "grayscale(1) opacity(0.2)" : "none", transition: "filter 0.3s" }}>{team.flag}</div>
                  <div style={{ fontWeight: 700, fontSize: 12, marginTop: 6 }}>{team.name}</div>
                  <div style={{ fontSize: 10, opacity: 0.4, marginTop: 2 }}>{team.country}</div>
                  {isWinner && <div style={{ fontSize: 10, color: color, marginTop: 5, fontWeight: 800 }}>✓ WIN</div>}
                </button>
              </React.Fragment>
            );
          })}
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: "#0f0f13", color: "#f0f0f5", padding: "20px 16px" }}>

      {/* Header */}
      <div style={{ textAlign: "center", marginBottom: 20 }}>
        <div style={{ fontSize: 11, letterSpacing: "0.18em", textTransform: "uppercase", color: "#6b6b7a", marginBottom: 4 }}>Sedona Olympics 2026</div>
        <h1 style={{ margin: 0, fontSize: 22, fontWeight: 900, letterSpacing: "-0.02em", background: "linear-gradient(90deg, #f59e0b, #8b5cf6)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>
          Cortney's 30th
        </h1>
        <div style={{ marginTop: 8, fontSize: 12, color: "#6b6b7a" }}>{completed}/{matches.length} games done</div>
        <div style={{ width: "100%", maxWidth: 300, height: 3, background: "#1e1e28", borderRadius: 2, margin: "6px auto 0" }}>
          <div style={{ height: "100%", width: (completed / matches.length * 100) + "%", background: "linear-gradient(90deg, #f59e0b, #8b5cf6)", borderRadius: 2, transition: "width 0.4s ease" }} />
        </div>
        <div style={{ marginTop: 5, fontSize: 10, color: saveFlash ? "#10b981" : "#2e2e3e", transition: "color 0.3s" }}>
          {saveFlash ? "✓ Saved" : "Auto-saves"}
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", gap: 8, marginBottom: 20, justifyContent: "center" }}>
        {[["matches","Matches"],["medals","Medal Table"]].map(([tab, label]) => (
          <button key={tab} onClick={() => setActiveTab(tab)} style={{ padding: "8px 20px", borderRadius: 8, border: activeTab === tab ? "2px solid #f59e0b" : "2px solid #1e1e28", background: activeTab === tab ? "#f59e0b18" : "#1a1a24", color: activeTab === tab ? "#f59e0b" : "#6b6b7a", cursor: "pointer", fontWeight: 700, fontSize: 12 }}>
            {label}
          </button>
        ))}
      </div>

      <div style={{ maxWidth: 480, margin: "0 auto" }}>

        {/* MATCHES TAB */}
        {activeTab === "matches" && (
          <div>
            {/* Beer Pong */}
            <div style={{ fontSize: 10, letterSpacing: "0.14em", textTransform: "uppercase", color: "#f59e0b", marginBottom: 10 }}>
              🏓 Beer Pong — {bpMatches.filter(m=>m.winner!==null).length}/{bpMatches.length} done
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 28 }}>
              {bpMatches.map(m => <MatchCard key={m.id} match={m} />)}
            </div>

            {/* Pool */}
            <div style={{ fontSize: 10, letterSpacing: "0.14em", textTransform: "uppercase", color: "#8b5cf6", marginBottom: 10 }}>
              🎱 Pool — {poolMatches.filter(m=>m.winner!==null).length}/{poolMatches.length} done
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {poolMatches.map(m => <MatchCard key={m.id} match={m} />)}
            </div>
          </div>
        )}

        {/* MEDAL TABLE TAB */}
        {activeTab === "medals" && (
          <div>
            <div style={{ fontSize: 10, letterSpacing: "0.14em", textTransform: "uppercase", color: "#6b6b7a", marginBottom: 12 }}>
              {allDone ? "Final Medal Table" : "Live Medal Table"}
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {sorted.map((team, i) => {
                const medal = medals[team.id];
                const mIcon = MEDAL_ICON[medal];
                const mColor = MEDAL_COLOR[medal];
                return (
                  <div key={team.id} style={{ background: "#1a1a24", borderRadius: 14, padding: "18px 16px", border: medal === "gold" ? "1px solid #f59e0b40" : "1px solid #1e1e28", display: "flex", alignItems: "center", gap: 14 }}>
                    <div style={{ fontSize: 28, width: 36, textAlign: "center" }}>{mIcon || (i + 1)}</div>
                    <div style={{ fontSize: 32 }}>{team.flag}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 800, fontSize: 14 }}>{team.name}</div>
                      <div style={{ fontSize: 11, color: "#6b6b7a", marginTop: 2 }}>{team.country}</div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontSize: 26, fontWeight: 900, color: team.wins > 0 ? mColor : "#3a3a4a" }}>{team.wins}</div>
                      <div style={{ fontSize: 10, color: "#6b6b7a" }}>wins</div>
                    </div>
                  </div>
                );
              })}
            </div>

            {allDone && (
              <div style={{ marginTop: 28, padding: 28, borderRadius: 16, background: "linear-gradient(135deg, #f59e0b18, #8b5cf618)", border: "1px solid #f59e0b50", textAlign: "center" }}>
                <div style={{ fontSize: 44, marginBottom: 8 }}>🏆</div>
                <div style={{ fontSize: 11, letterSpacing: "0.15em", textTransform: "uppercase", color: "#6b6b7a", marginBottom: 10 }}>Sedona Olympics Champion</div>
                <div style={{ fontSize: 52, marginBottom: 8 }}>{sorted[0].flag}</div>
                <div style={{ fontSize: 24, fontWeight: 900, color: "#f59e0b" }}>{sorted[0].name}</div>
                <div style={{ fontSize: 13, color: "#6b6b7a", marginTop: 4 }}>{sorted[0].country} · {sorted[0].wins} wins</div>
              </div>
            )}
          </div>
        )}

        <button onClick={resetAll} style={{ marginTop: 24, width: "100%", padding: "12px", borderRadius: 12, border: "1px solid #2a1a1a", background: "transparent", color: "#3a2a2a", cursor: "pointer", fontWeight: 600, fontSize: 12 }}>
          Reset Tournament
        </button>
        <div style={{ height: 40 }} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
