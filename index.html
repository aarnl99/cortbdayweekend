<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sedona Olympics 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f13; color: #f0f0f5; font-family: 'Inter', system-ui, sans-serif; }
  button { font-family: inherit; }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .slide { animation: slideIn 0.2s ease forwards; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const TEAMS = [
  { id: 0, name: "Aaron & Josh",      country: "United States", flag: "🇺🇸" },
  { id: 1, name: "MJ & Nick",         country: "Djibouti",      flag: "🇩🇯" },
  { id: 2, name: "Ashlyn & Sandra",   country: "Philippines",   flag: "🇵🇭" },
  { id: 3, name: "Cortney & Anthony", country: "Malta",         flag: "🇲🇹" },
];

const SPORTS = [
  { id: "bp",   name: "Beer Pong", icon: "🏓", color: "#f59e0b" },
  { id: "pool", name: "Pool",      icon: "🎱", color: "#8b5cf6" },
];

const STORAGE_KEY = "sedona-live-v1";

function newGame(id) {
  return { id, a: null, b: null, sport: null, winner: null };
}

function load() {
  try { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : null; }
  catch { return null; }
}

function App() {
  const saved = load();
  const [games, setGames] = useState(saved || [newGame(0)]);
  const [saveFlash, setSaveFlash] = useState(false);

  useEffect(() => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(games));
    setSaveFlash(true);
    const t = setTimeout(() => setSaveFlash(false), 1000);
    return () => clearTimeout(t);
  }, [games]);

  function updateGame(id, patch) {
    setGames(prev => prev.map(g => g.id !== id ? g : { ...g, ...patch }));
  }

  function addGame() {
    setGames(prev => [...prev, newGame(Date.now())]);
  }

  function removeGame(id) {
    setGames(prev => prev.filter(g => g.id !== id));
  }

  function setWinner(id, teamId) {
    setGames(prev => prev.map(g => {
      if (g.id !== id) return g;
      return { ...g, winner: g.winner === teamId ? null : teamId };
    }));
  }

  // Medal count: every win = one gold medal
  const medalCount = { 0: 0, 1: 0, 2: 0, 3: 0 };
  games.forEach(g => { if (g.winner !== null) medalCount[g.winner]++; });
  const medalTable = TEAMS.map(t => ({ ...t, medals: medalCount[t.id] }))
    .sort((a, b) => b.medals - a.medals);

  return (
    <div style={{ minHeight: "100vh", background: "#0f0f13", padding: "20px 16px 60px" }}>

      {/* Header */}
      <div style={{ textAlign: "center", marginBottom: 24 }}>
        <div style={{ fontSize: 11, letterSpacing: "0.18em", textTransform: "uppercase", color: "#6b6b7a", marginBottom: 4 }}>Sedona Olympics 2026</div>
        <h1 style={{ fontSize: 24, fontWeight: 900, letterSpacing: "-0.02em", background: "linear-gradient(90deg, #f59e0b, #8b5cf6)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>
          Cortney's 30th
        </h1>
        <div style={{ marginTop: 5, fontSize: 10, color: saveFlash ? "#10b981" : "#2e2e3e", transition: "color 0.3s" }}>
          {saveFlash ? "✓ Saved" : "Auto-saves"}
        </div>
      </div>

      <div style={{ maxWidth: 480, margin: "0 auto" }}>

        {/* Games */}
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          {games.map((game, idx) => {
            const sport = SPORTS.find(s => s.id === game.sport);
            const color = sport ? sport.color : "#6b6b7a";
            const teamA = game.a !== null ? TEAMS[game.a] : null;
            const teamB = game.b !== null ? TEAMS[game.b] : null;
            const ready = teamA && teamB && sport;
            const hasWinner = game.winner !== null;

            return (
              <div key={game.id} className="slide" style={{ background: "#1a1a24", borderRadius: 16, overflow: "hidden", border: hasWinner ? "1px solid " + color + "60" : "1px solid #1e1e28" }}>

                {/* Game header */}
                <div style={{ padding: "10px 14px", background: "#14141e", borderBottom: "1px solid #12121a", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                  <span style={{ fontSize: 11, letterSpacing: "0.1em", textTransform: "uppercase", color: "#6b6b7a", fontWeight: 700 }}>
                    Game {idx + 1}
                  </span>
                  <button onClick={() => removeGame(game.id)} style={{ fontSize: 11, color: "#3a2a2a", background: "transparent", border: "none", cursor: "pointer", padding: "2px 6px" }}>
                    ✕ Remove
                  </button>
                </div>

                <div style={{ padding: "14px" }}>

                  {/* Sport picker */}
                  <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
                    {SPORTS.map(s => (
                      <button key={s.id} onClick={() => updateGame(game.id, { sport: s.id })}
                        style={{ flex: 1, padding: "9px 6px", borderRadius: 10, border: game.sport === s.id ? "2px solid " + s.color : "2px solid #2a2a3a", background: game.sport === s.id ? s.color + "20" : "transparent", color: game.sport === s.id ? s.color : "#6b6b7a", cursor: "pointer", fontWeight: 700, fontSize: 13, display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
                        {s.icon} {s.name}
                      </button>
                    ))}
                  </div>

                  {/* Team picker */}
                  <div style={{ display: "flex", gap: 8, marginBottom: ready ? 14 : 0 }}>
                    {/* Team A */}
                    <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 6 }}>
                      <div style={{ fontSize: 10, letterSpacing: "0.1em", textTransform: "uppercase", color: "#6b6b7a", marginBottom: 2, textAlign: "center" }}>Team A</div>
                      {TEAMS.map(t => {
                        const isSelected = game.a === t.id;
                        const isDisabled = game.b === t.id;
                        return (
                          <button key={t.id} onClick={() => !isDisabled && updateGame(game.id, { a: t.id, winner: null })}
                            style={{ padding: "8px 6px", borderRadius: 8, border: isSelected ? "2px solid #f59e0b" : "2px solid #2a2a3a", background: isSelected ? "#f59e0b18" : "transparent", color: isSelected ? "#f59e0b" : isDisabled ? "#252530" : "#f0f0f5", cursor: isDisabled ? "default" : "pointer", fontSize: 11, fontWeight: 600, display: "flex", alignItems: "center", gap: 6 }}>
                            <span style={{ fontSize: 18 }}>{t.flag}</span>
                            <span style={{ lineHeight: 1.2 }}>{t.name}</span>
                          </button>
                        );
                      })}
                    </div>

                    <div style={{ display: "flex", alignItems: "center", color: "#2a2a3a", fontWeight: 800, fontSize: 12, paddingTop: 24 }}>VS</div>

                    {/* Team B */}
                    <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 6 }}>
                      <div style={{ fontSize: 10, letterSpacing: "0.1em", textTransform: "uppercase", color: "#6b6b7a", marginBottom: 2, textAlign: "center" }}>Team B</div>
                      {TEAMS.map(t => {
                        const isSelected = game.b === t.id;
                        const isDisabled = game.a === t.id;
                        return (
                          <button key={t.id} onClick={() => !isDisabled && updateGame(game.id, { b: t.id, winner: null })}
                            style={{ padding: "8px 6px", borderRadius: 8, border: isSelected ? "2px solid #8b5cf6" : "2px solid #2a2a3a", background: isSelected ? "#8b5cf618" : "transparent", color: isSelected ? "#8b5cf6" : isDisabled ? "#252530" : "#f0f0f5", cursor: isDisabled ? "default" : "pointer", fontSize: 11, fontWeight: 600, display: "flex", alignItems: "center", gap: 6 }}>
                            <span style={{ fontSize: 18 }}>{t.flag}</span>
                            <span style={{ lineHeight: 1.2 }}>{t.name}</span>
                          </button>
                        );
                      })}
                    </div>
                  </div>

                  {/* Winner picker — only shows when both teams + sport selected */}
                  {ready && (
                    <div>
                      <div style={{ fontSize: 10, letterSpacing: "0.1em", textTransform: "uppercase", color: "#6b6b7a", marginBottom: 8, textAlign: "center" }}>
                        {hasWinner ? "Winner" : "Tap to pick winner"}
                      </div>
                      <div style={{ display: "flex", gap: 8 }}>
                        {[teamA, teamB].map(team => {
                          const isWinner = game.winner === team.id;
                          const isLoser  = hasWinner && !isWinner;
                          return (
                            <button key={team.id} onClick={() => setWinner(game.id, team.id)}
                              style={{ flex: 1, padding: "14px 8px", borderRadius: 12, border: isWinner ? "2px solid " + color : "2px solid #2a2a3a", background: isWinner ? color + "25" : "#0f0f13", cursor: "pointer", textAlign: "center", color: isWinner ? color : isLoser ? "#2e2e3e" : "#f0f0f5", transition: "all 0.2s" }}>
                              <div style={{ fontSize: 28, filter: isLoser ? "grayscale(1) opacity(0.2)" : "none" }}>{team.flag}</div>
                              <div style={{ fontWeight: 700, fontSize: 12, marginTop: 6 }}>{team.name}</div>
                              {isWinner && <div style={{ fontSize: 11, color: color, marginTop: 4, fontWeight: 800 }}>🥇 WIN</div>}
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>

        {/* Add game button */}
        <button onClick={addGame} style={{ marginTop: 12, width: "100%", padding: "14px", borderRadius: 14, border: "1px dashed #2a2a3a", background: "transparent", color: "#6b6b7a", cursor: "pointer", fontSize: 14, fontWeight: 700 }}>
          + Add Game
        </button>

        {/* Medal Table */}
        <div style={{ marginTop: 32 }}>
          <div style={{ fontSize: 10, letterSpacing: "0.14em", textTransform: "uppercase", color: "#6b6b7a", marginBottom: 12 }}>
            🏅 Live Medal Count
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {medalTable.map((team, i) => (
              <div key={team.id} style={{ background: "#1a1a24", borderRadius: 14, padding: "16px", border: i === 0 && team.medals > 0 ? "1px solid #f59e0b40" : "1px solid #1e1e28", display: "flex", alignItems: "center", gap: 12 }}>
                <div style={{ fontSize: 28 }}>{team.flag}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 800, fontSize: 13 }}>{team.name}</div>
                  <div style={{ fontSize: 11, color: "#6b6b7a" }}>{team.country}</div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 3, flexWrap: "wrap", justifyContent: "flex-end", maxWidth: 130 }}>
                  {team.medals > 0
                    ? Array.from({ length: team.medals }).map((_, wi) => (
                        <span key={wi} style={{ fontSize: 20 }}>🥇</span>
                      ))
                    : <span style={{ fontSize: 11, color: "#3a3a4a" }}>No medals yet</span>
                  }
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Reset */}
        <button onClick={() => { if (confirm("Reset everything?")) { setGames([newGame(0)]); }}}
          style={{ marginTop: 16, width: "100%", padding: "12px", borderRadius: 12, border: "1px solid #2a1a1a", background: "transparent", color: "#3a2a2a", cursor: "pointer", fontWeight: 600, fontSize: 12 }}>
          Reset Tournament
        </button>

        <div style={{ height: 40 }} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
